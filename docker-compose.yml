# You can freely choose which server to run. They don't depend on one another.
# This file gives an example config for both games.

services:
  ets2-server:
    build: .
    image: lshallo/ets2-convoy-server
    # image: ghcr.io/lshallo/ets2-convoy-server # GitHub container registry
    container_name: ets2-server
    restart: unless-stopped
    tty: true
    network_mode: host # important to make game appear in server list
    # if you want to join via direct join token (displayed in logs on startup) you can use port mapping
    # the game will not appear in server list because the server can't determine the external IP
    #ports:
    #  - "27015:27015"
    #  - "27016:27016"
    #  - "27015:27015/udp"
    #  - "27016:27016/udp"
    volumes:
    # Server files. (executable, libraries)
    # Only mount if you know what you are doing. Can lead to permissions issues.
    #  - "/opt/ets2-server/game-data:/app"
    # Only needed when using custom server_packages.sii and server_packages.dat.
    # Also keeps banlist. If you want to persist the banlist mount this folder.
      - "./save-data:/home/steam/.local/share/Euro Truck Simulator 2"
    environment:
      - "ETS_SERVER_UPDATE_ON_START=true"
      - "ETS_SERVER_NAME=NCS SERVER [PE]"
      - "ETS_SERVER_DESCRIPTION=NCS Server Peruano"
      - "ETS_SERVER_WELCOME_MESSAGE=Bienvenido a NCS, Diviertete!"
      - "ETS_SERVER_PASSWORD="
      - "ETS_SERVER_MAX_PLAYERS=128"
      - "ETS_SERVER_PORT=27015"
      - "ETS_SERVER_QUERY_PORT=27016"
      - "ETS_SERVER_LOGON_TOKEN=F492F770192BA0A0D636EF7AFB867F80"
      # Moderadores (SteamID64) separados por coma.
      - "ETS_SERVER_MODERATORS=76561199220962922,76561198858304637,76561198681541887"
      # more variables...

  # Monitor: lee el log en solo-lectura y expone un endpoint HTTP (JSON) con
  # los conectados + eventos de entrada/salida, y avisa a Discord (opcional).
  # Consulta:  curl http://<IP-DEL-VPS>:8080/status
  ets2-monitor:
    build: ./monitor
    image: ets2-convoy-monitor
    container_name: ets2-monitor
    restart: unless-stopped
    depends_on:
      - ets2-server
    ports:
      - "8080:8080"
    volumes:
      # Mismo save-data del server, pero en SOLO LECTURA.
      - "./save-data:/logs:ro"
    environment:
      - "MONITOR_LOG_FILE=/logs/server.log.txt"
      - "MONITOR_PORT=8080"
      - "MONITOR_SERVER_NAME=NCS SERVER"
      # Token opcional para proteger el endpoint (vacío = abierto).
      # Si lo pones, consulta con: -H "Authorization: Bearer <token>"
      - "MONITOR_TOKEN=ncs-peru-monitor-7b3f9a1c8e2d4056"
      # Webhook de Discord para avisos de conexión/desconexión (vacío = desactivado).
      - "DISCORD_WEBHOOK_URL="

